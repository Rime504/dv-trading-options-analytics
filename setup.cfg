[tool:pytest]
testpaths = src/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = --tb=short -v

[coverage:run]
source = .
omit =
    tests/*
    dashboard.py
    verify.py

[coverage:report]
show_missing = True
skip_covered = False
fail_under = 90
exclude_lines =
    pragma: no cover
    def __repr__
    if __name__ == .__main__.
